name: dividend

services:
  app:
    container_name: dividendtracker
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      HOME: /app/data
    volumes:
      - app-data:/app/data
    networks:
      - default
      - homelab
    restart: unless-stopped

volumes:
  app-data:

networks:
  homelab:
    external: true
