name: dividend

services:
  app:
    container_name: dividendtracker
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOME: /app/data
    volumes:
      - app-data:/app/data
    networks:
      - default
      - homelab
      - db-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  app-data:

networks:
  homelab:
    external: true
  db-net:
    external: true
